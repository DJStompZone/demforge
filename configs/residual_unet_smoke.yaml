seed: 1337
device: auto

data:
  train_dir: data/synthetic/train
  val_dir: data/synthetic/val
  num_workers: 2

model:
  in_channels: 4
  out_channels: 1
  base_channels: 32
  channel_mults: [1, 2, 4]
  attention_at_bottleneck: true

train:
  epochs: 5
  batch_size: 8
  grad_accum_steps: 1
  lr: 0.0003
  weight_decay: 0.00001
  amp: true
  clip_grad_norm: 1.0
  save_every_steps: 250
  render_every_steps: 250
  output_dir: outputs

loss:
  height_l1: 1.0
  gradient_l1: 0.65
  laplacian_l1: 0.35
  spectral_l1: 0.10
  seam_l1: 0.15

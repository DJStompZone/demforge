seed: 1337
device: auto

data:
  train_dir: data/tiles/train
  val_dir: data/tiles/val
  num_workers: 4

model:
  in_channels: 4
  out_channels: 1
  base_channels: 48
  channel_mults: [1, 2, 4, 4]
  attention_at_bottleneck: true

train:
  epochs: 80
  batch_size: 2
  grad_accum_steps: 8
  lr: 0.0002
  weight_decay: 0.00001
  amp: true
  clip_grad_norm: 1.0
  save_every_steps: 1000
  render_every_steps: 1000
  output_dir: outputs

loss:
  height_l1: 1.0
  gradient_l1: 0.75
  laplacian_l1: 0.45
  spectral_l1: 0.15
  seam_l1: 0.20
